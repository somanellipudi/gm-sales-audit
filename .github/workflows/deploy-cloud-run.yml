name: Deploy MonkAudit to Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: monkaudit-cloud-run
  cancel-in-progress: true

env:
  PROJECT_ID: growingmonk-495400
  REGION: asia-south1
  SERVICE: monkaudit
  SERVICE_ACCOUNT: monkaudit-runner@growingmonk-495400.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/678831951654/locations/global/workloadIdentityPools/github/providers/gm-sales-audit

jobs:
  test:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          source: .
          env_vars_update_strategy: merge
          env_vars: |-
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            MONKAUDIT_DB_PATH=/tmp/monkaudit.sqlite3
          flags: >-
            --service-account=${{ env.SERVICE_ACCOUNT }}
            --allow-unauthenticated

      - name: Show service URL
        run: echo "${{ steps.deploy.outputs.url }}"
